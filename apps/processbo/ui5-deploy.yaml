# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: de.brandeis.dmo.processbo
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://demo.brandeis.de:50000
          client: '001'
        app:
          name: ZDMO_PBO
          description: 'Demo: Process BO'
          package: $DMO_RAP1
          transport: ''
        exclude:
          - /test/
